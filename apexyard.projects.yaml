version: 1

projects:
  - name: xadvisor
    repo: OmarElaraby26/xadvisor
    workspace: workspace/xadvisor
    docs: projects/xadvisor
    status: active
    tier: P1
    roles:
      - tech-lead
      - backend-engineer
      - data-engineer
      - data-analyst
    tags:
      - cli
      - python
      - research
      - finance
    ticket_prefix: GH

  - name: xadvisor-ocr
    repo: OmarElaraby26/xadvisor-ocr
    workspace: workspace/xadvisor-ocr
    docs: projects/xadvisor-ocr
    status: handover
    roles:
      - tech-lead
      - backend-engineer
      - platform-engineer
      - qa-engineer
    tags:
      - python
      - ocr
      - library
    ticket_prefix: GH

defaults:
  status: active
  tier: P1
  ticket_prefix: GH
  roles:
    - tech-lead
